# Robolectric 4.16 ships sandboxes up to API 36, so it refuses to run against
# the app's targetSdk of 37. Pinning the emulated SDK here keeps the app on the
# current target rather than lowering production config to suit the test runner.
# Raise this once Robolectric supports 37.
sdk=36

# Use a plain Application rather than VeraVideoApp. The real one is
# @HiltAndroidApp and initializes WorkManager in onCreate, neither of which a
# Room or utility test needs — and both of which fail without a Hilt test
# harness. Tests that need the real graph should opt in with @HiltAndroidTest.
application=android.app.Application
